# Docker Compose for Symfizzy Local Development
# This file allows running the symfizzy service locally for development and testing

version: '3.8'

services:
  symfizzy:
    build:
      context: ..
      dockerfile: symfizzy/Dockerfile
    container_name: symfizzy
    ports:
      - "8080:8080"  # Symfizzy OpenAI API
      - "9000:9000"  # OVMS gRPC
      - "8001:8001"  # OVMS REST
    environment:
      - OVMS_HOST=localhost
      - OVMS_PORT=9000
      - OVMS_REST_PORT=8001
      - SYMFIZZY_PORT=8080
      - MODEL_NAME=openai-model
    volumes:
      - ../symfizzy/models:/app/models
      - symfizzy_ovms_data:/app/ovms
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  symfizzy_ovms_data:
