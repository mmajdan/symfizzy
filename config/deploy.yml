# Name of this app
service: fizzy
image: fizzy


#-- About your deployment --#

# Where to deploy fizzy
servers:
  web:
    - localhost
  symphony:
    hosts:
      - localhost
    cmd: bin/rails "symphony:run[WORKFLOW.md,false]"
    proxy: false

# How you connect to your server
ssh:
  user: mmajdan

# Automatic SSL
proxy:
  ssl: false
  host: localhost

# Your application configuration (secrets come from .kamal/secrets).
env:
  secret:
    - SECRET_KEY_BASE
    - VAPID_PUBLIC_KEY
    - VAPID_PRIVATE_KEY
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - GH_TOKEN
    - OPENAI_API_KEY
  clear:
    BASE_URL: http://localhost # The public URL of your Fizzy instance
    MAILER_FROM_ADDRESS: fizzy@mg.majdan.online # The email "from" address that Fizzy sends email from
    SMTP_ADDRESS: smtp.eu.mailgun.org # The SMTP server you'll use to send email
    SMTP_PORT: 465 # Mailgun SSL/TLS SMTP port
    SMTP_TLS: true # Use SMTPS/TLS for outbound mail
    MULTI_TENANT: false # Set to true to allow multiple accounts to sign up
    SOLID_QUEUE_IN_PUMA: true # Run background jobs in the app container
    GITHUB_REPO: mmajdan/fizzy # GitHub repo Symphony should open PRs against
    FIZZY_ACCOUNT_ID: 338000007 # External account id Symphony should watch


#-- General configuration --#

# Use a local registry to deploy
registry:
  server: localhost:5555

# Handy aliases for interacting with your deployment. For eaxmple: `bin/kamal console` will connect to a
# Rails console in production.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  symphony_logs: app logs -r symphony -f
  symphony_shell: app exec -r symphony --interactive --reuse "bash"
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "fizzy_storage:/rails/storage"
  - "fizzy_symphony_workspaces:/rails/tmp/symphony_workspaces"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  context: .
