# Symfizzy - Deployed with external Caddy on standard HTTPS port
service: fizzy
image: mmajdan/fizzy

servers:
  web:
    hosts:
      - nexus.majdan.online
    proxy: false
    options:
      publish: 8007:80
  symphony:
    hosts:
      - nexus.majdan.online
    cmd: bin/rails symphony:run
    proxy: false

ssh:
  user: mmajdan

# External Caddy handles SSL and reverse proxy on standard HTTPS port (443)
# Rails app runs on port 8007 (accessible via Docker network)

env:
  secret:
    - SECRET_KEY_BASE
    - VAPID_PUBLIC_KEY
    - VAPID_PRIVATE_KEY
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - GH_TOKEN
  clear:
    BASE_URL: https://nexus.majdan.online
    MAILER_FROM_ADDRESS: fizzy@mg.majdan.online
    SMTP_ADDRESS: smtp.eu.mailgun.org
    SMTP_PORT: 587
    SMTP_TLS: false
    MULTI_TENANT: false
    SOLID_QUEUE_IN_PUMA: true
    ASSUME_SSL: true
    FORCE_SSL: true
    GIT_AUTHOR_NAME: Symphony
    GIT_AUTHOR_EMAIL: symphony@nexus.majdan.online
    GIT_COMMITTER_NAME: Symphony
    GIT_COMMITTER_EMAIL: symphony@nexus.majdan.online
    SYMPHONY_WORKFLOW_PATH: /rails/symphony

registry:
  server: ghcr.io
  username: mmajdan
  password:
    - GH_TOKEN

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  symphony_logs: app logs -r symphony -f
  symphony_shell: app exec -r symphony --interactive --reuse "bash"
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "fizzy_storage:/rails/storage"
  - "fizzy_symphony_workspaces:/rails/tmp/symphony_workspaces"
  - "/home/mmajdan/workflows:/rails/symphony:ro"

asset_path: /rails/public/assets

builder:
  arch: amd64
  context: .
